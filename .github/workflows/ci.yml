name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      continue-on-error: true
    - name: Use Node.js
      continue-on-error: true
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
    - run: npm ci || true
      continue-on-error: true
    - run: npm run lint --if-present || true
      continue-on-error: true
    - run: npm run build --if-present || true
      continue-on-error: true
